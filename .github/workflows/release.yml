name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: ${{ matrix.arch }}

      - name: Install production dependencies
        run: npm install --omit=dev

      - name: Build TypeScript
        run: |
          npm install --save-dev typescript @types/node
          npx tsc
          npm prune --omit=dev

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: |
          ARCHIVE="pty-bridge-${{ steps.version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          mkdir -p staging/pty-bridge
          cp -r dist node_modules package.json staging/pty-bridge/
          mkdir -p staging/pty-bridge/bin
          cp bin/pty-bridge staging/pty-bridge/bin/
          chmod +x staging/pty-bridge/bin/pty-bridge
          tar -czf "$ARCHIVE" -C staging pty-bridge
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: pty-bridge-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: '*.tar.gz'
          generate_release_notes: true
